<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Set · Live</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">◓ <span>DJ SET</span> · live</div>
      <div class="stats" id="setStats">—</div>
      <div class="controls">
        <button data-act="start" title="Start the ordered set">▶ start set</button>
        <button data-act="play">play</button>
        <button data-act="pause">pause</button>
        <button data-act="skip">skip ▸</button>
      </div>
    </header>

    <main>
      <section class="now card">
        <img id="art" alt="" />
        <div class="meta">
          <div class="title" id="nowTitle">Waiting for playback…</div>
          <div class="artist" id="nowArtist"></div>
          <div class="badges">
            <span class="badge cam" id="bCam">—</span>
            <span class="badge" id="bBpm">— BPM</span>
            <span class="badge" id="bKey">—</span>
            <span class="badge" id="bEnergy">energy —</span>
          </div>
          <div class="progress"><div class="bar" id="progBar"></div></div>
          <div class="transition" id="nowTrans"></div>
        </div>
        <canvas id="wheel" width="150" height="150"></canvas>
      </section>

      <section class="card waveform">
        <div class="card-label">current track · waveform + energy</div>
        <canvas id="waveChart"></canvas>
      </section>

      <section class="card arc">
        <div class="card-label">set energy arc <span id="posLabel"></span></div>
        <canvas id="arcChart"></canvas>
      </section>

      <section class="card upnext">
        <div class="card-label">up next</div>
        <ul id="upnextList"></ul>
      </section>
    </main>
    <div id="err"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
